<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>Ultra Premium Music App</title>
  <style>
    /* জিপিইউ হার্ডওয়্যার অ্যাক্সিলারেটেড সুপার-ফাস্ট সিএসএস */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }
    
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #060609;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* প্রিমিয়াম গ্লাস হেডার */
    .app-header {
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(18, 18, 26, 0.85);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      z-index: 10;
    }

    .app-title {
      font-weight: 800;
      font-size: 1.15rem;
      letter-spacing: 1px;
      color: #ff3b30;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(255, 59, 48, 0.3);
    }

    /* স্লিপ টাইমার ড্রপডাউন */
    .timer-select {
      background: #1c1c27;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
    }

    /* প্রিমিয়াম প্লেয়ার কন্টেইনার */
    .player-container {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
    }
    
    /* ইউটিউব লোগো, সাবস্ক্রাইব বাটন ও টাইটেল ক্রপ করার জন্য জুম ও পজিশন */
    .player-container iframe, #yt-player {
      position: absolute;
      top: 50% !important;
      left: 50% !important;
      width: 100% !important;
      height: 100% !important;
      transform: translate(-50%, -50%) scale(1.35) !important; /* জুম করে ইউটিউব ব্র্যান্ডিং লুকানো */
      border: 0;
      pointer-events: none; /* ক্লিকের মাধ্যমে ইউটিউবে চলে যাওয়া রোধ করতে */
    }

    .player-blocker {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 5;
      cursor: pointer;
    }

    /* স্পটিফাই স্টাইল মিউজিক কন্ট্রোল প্যানেল */
    .controls-panel {
      background: #0e0e14;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .progress-wrapper {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.75rem;
      color: #8e8e93;
      font-weight: 500;
    }

    .progress-bar {
      flex: 1;
      height: 5px;
      background: #232330;
      border-radius: 10px;
      position: relative;
      cursor: pointer;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ff3b30, #ff6b6b);
      border-radius: 10px;
      position: absolute;
      left: 0;
      top: 0;
      box-shadow: 0 0 8px rgba(255, 59, 48, 0.6);
      transition: width 0.15s linear;
    }

    .btn-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 30px;
    }

    .btn {
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      will-change: transform, opacity;
      transition: transform 0.1s ease, opacity 0.1s ease;
    }

    .btn:active {
      transform: scale(0.85);
      opacity: 0.7;
    }

    .btn-nav svg {
      fill: #ffffff;
      width: 28px;
      height: 28px;
    }

    .btn-play {
      background: linear-gradient(135deg, #ff3b30, #ff5e52);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      box-shadow: 0 4px 15px rgba(255, 59, 48, 0.4);
    }

    .btn-play svg {
      fill: #ffffff;
      width: 24px;
      height: 24px;
    }

    /* সুপার স্মুথ প্লেলিস্ট */
    .playlist {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      -webkit-overflow-scrolling: touch;
    }

    .video-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #111118;
      border-radius: 12px;
      padding: 10px;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.02);
      will-change: transform, background-color;
      transition: transform 0.1s ease, background-color 0.2s ease, border-color 0.2s ease;
    }

    .video-card:active {
      transform: scale(0.98);
      background: #181822;
    }

    .video-card.active {
      background: rgba(255, 59, 48, 0.08);
      border-color: rgba(255, 59, 48, 0.3);
    }

    .card-left {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .thumb-wrapper {
      position: relative;
      width: 90px;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .thumb-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* রিয়েল-টাইম সাউন্ড ওয়েব ইকুয়ালাইজার অ্যানিমেশন */
    .wave-container {
      position: absolute;
      bottom: 4px;
      right: 6px;
      display: none;
      align-items: flex-end;
      gap: 2px;
      height: 12px;
    }

    .video-card.active .wave-container {
      display: flex;
    }

    .wave-bar {
      width: 2px;
      height: 100%;
      background-color: #ff3b30;
      animation: bounce 0.8s ease infinite alternate;
      animation-play-state: paused; /* ডিফল্ট পজড থাকবে */
    }
    
    /* গান চললে অ্যানিমেশন চালু হবে */
    .playing .wave-bar {
      animation-play-state: running;
    }

    .wave-bar:nth-child(2) { animation-delay: 0.2s; }
    .wave-bar:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0% { height: 3px; }
      100% { height: 12px; }
    }

    .video-info {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
    }

    .video-title {
      font-size: 0.88rem;
      font-weight: 600;
      line-height: 1.3;
      color: #ffffff;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .video-card.active .video-title {
      color: #ff3b30;
    }

    .video-subtitle {
      font-size: 0.75rem;
      color: #8e8e93;
    }

    /* ডিলিট বাটন */
    .btn-delete {
      background: none;
      border: none;
      color: #8e8e93;
      cursor: pointer;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }

    .btn-delete:active {
      background: rgba(255, 59, 48, 0.15);
      color: #ff3b30;
    }

    .btn-delete svg {
      fill: currentColor;
      width: 18px;
      height: 18px;
    }

    /* নতুন গান যোগ করার ফ্লোটিং অ্যাকশন বাটন (FAB) */
    .fab-add {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: linear-gradient(135deg, #ff3b30, #ff5e52);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 5px 20px rgba(255, 59, 48, 0.4);
      cursor: pointer;
      z-index: 15;
      will-change: transform;
      transition: transform 0.1s ease;
    }

    .fab-add:active {
      transform: scale(0.9);
    }

    .fab-add svg {
      fill: #ffffff;
      width: 24px;
      height: 24px;
    }

    /* গ্লাস-মরফিজম ইনপুট মডাল */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.75);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
      padding: 20px;
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
    }

    .modal-content {
      background: #12121a;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      animation: slideUp 0.3s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
    }

    @keyframes slideUp {
      from { transform: translateY(50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal-title {
      font-weight: 700;
      font-size: 1.1rem;
      color: #ff3b30;
    }

    .input-field {
      background: #1c1c27;
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: #fff;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      width: 100%;
    }

    .input-field:focus {
      border-color: #ff3b30;
    }

    .modal-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 8px;
    }

    .btn-modal {
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
    }

    .btn-cancel {
      background: #232330;
      color: #fff;
    }

    .btn-save {
      background: #ff3b30;
      color: #fff;
    }
  </style>
</head>
<body>

  <!-- গ্লাস অ্যাপ হেডার ও স্লিপ টাইমার -->
  <div class="app-header">
    <div class="app-title">My Playlist</div>
    <select class="timer-select" id="sleep-timer">
      <option value="0">Sleep Timer: Off</option>
      <option value="10">10 Min</option>
      <option value="20">20 Min</option>
      <option value="30">30 Min</option>
      <option value="60">60 Min</option>
    </select>
  </div>

  <!-- ভিডিও প্লেয়ার সেকশন -->
  <div class="player-container">
    <div id="yt-player"></div>
    <div class="player-blocker" id="player-blocker"></div>
  </div>

  <!-- প্রিমিয়াম কন্ট্রোল প্যানেল -->
  <div class="controls-panel" id="controls-panel">
    <!-- প্রোগ্রেস বার -->
    <div class="progress-wrapper">
      <span id="current-time">0:00</span>
      <div class="progress-bar" id="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <span id="total-time">0:00</span>
    </div>
    
    <!-- বাটনসমূহ -->
    <div class="btn-row">
      <!-- প্রিভিয়াস -->
      <button class="btn btn-nav" id="btn-prev">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6L18 18V6z"/></svg>
      </button>
      <!-- প্লে/পজ -->
      <button class="btn btn-play" id="btn-play">
        <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg id="pause-icon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <!-- নেক্সট -->
      <button class="btn btn-nav" id="btn-next">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6zm9-12v12h2V6z"/></svg>
      </button>
    </div>
  </div>

  <!-- প্লেলিস্ট -->
  <div class="playlist" id="playlist"></div>

  <!-- ফ্লোটিং অ্যাকশন বাটন (FAB) -->
  <div class="fab-add" id="fab-add-video" title="Add Video">
    <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
  </div>

  <!-- ভিডিও যোগ করার মডাল উইন্ডো -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-content">
      <div class="modal-title">Add YouTube Video</div>
      <input type="text" class="input-field" id="video-url" placeholder="Paste YouTube Link or Video ID" autocomplete="off">
      <input type="text" class="input-field" id="video-title" placeholder="Song Title" autocomplete="off">
      <input type="text" class="input-field" id="video-artist" placeholder="Artist / Subtitle (Optional)" autocomplete="off">
      <div class="modal-buttons">
        <button class="btn-modal btn-cancel" id="btn-close-modal">Cancel</button>
        <button class="btn-modal btn-save" id="btn-save-video">Add Song</button>
      </div>
    </div>
  </div>

  <script>
    // ডিফল্ট ৩টি ভিডিও
    const defaultPlaylist = [
      { id: "YLQxcEFmYz8", title: "Samjhawan - Arijit Singh & Shreya Ghoshal", subtitle: "Slowed + Reverb Mood" },
      { id: "E_EFJFW0OmM", title: "Teri Yaadon Mein - Aawara Angaara", subtitle: "Sad Lofi Vibes" },
      { id: "aWqxQSSR_uo", title: "Mann Mera (Original Version) - Gajendra Verma", subtitle: "Lofi Retro Remix" }
    ];

    // লোকাল স্টোরেজ থেকে ডেটা লোড করা হচ্ছে
    let playlistData = JSON.parse(localStorage.getItem('my_custom_playlist'));
    if (!playlistData || playlistData.length === 0) {
      playlistData = [...defaultPlaylist];
      localStorage.setItem('my_custom_playlist', JSON.stringify(playlistData));
    }

    let player;
    let currentIdx = 0;
    let progressTimer;
    let sleepTimerTimeout = null;
    let isPlayerReady = false;

    // ১. ভিডিওর তালিকা সাথে সাথে রেন্ডার করা (Dynamic UI rendering)
    const playlistEl = document.getElementById('playlist');
    function renderPlaylist() {
      playlistEl.innerHTML = '';
      playlistData.forEach((vid, index) => {
        const card = document.createElement('div');
        card.className = `video-card ${index === currentIdx ? 'active' : ''}`;
        
        card.innerHTML = `
          <div class="card-left">
            <div class="thumb-wrapper">
              <img src="https://img.youtube.com/vi/${vid.id}/mqdefault.jpg" alt="thumbnail" loading="lazy">
              <div class="wave-container">
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
              </div>
            </div>
            <div class="video-info">
              <div class="video-title">${vid.title}</div>
              <div class="video-subtitle">${vid.subtitle}</div>
            </div>
          </div>
          <!-- ডিলিট বাটন -->
          <button class="btn-delete" title="Delete Song">
            <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
          </button>
        `;

        // কার্ডে ক্লিক করলে গান বাজবে
        card.querySelector('.card-left').addEventListener('click', () => switchVideo(index));

        // ডিলিট বাটনের অ্যাকশন
        card.querySelector('.btn-delete').addEventListener('click', (e) => {
          e.stopPropagation(); // কার্ডের ক্লিক ইভেন্ট থামানোর জন্য
          deleteVideo(index);
        });

        playlistEl.appendChild(card);
      });
    }

    // প্রথম লোডেই প্লেলিস্ট রেন্ডার করা হলো
    renderPlaylist();

    // ২. ইউটিউব আইফ্রেম এপিআই ইনিশিয়েট করা (Localhost এবং No-Cookie ও ফ্রেন্ডলি অরিজিন সেটআপ)
    window.onYouTubeIframeAPIReady = function() {
      try {
        let currentOrigin = window.location.origin;
        if (window.location.protocol === "file:") currentOrigin = "*";

        player = new YT.Player('yt-player', {
          host: 'https://www.youtube-nocookie.com', // ট্র্যাকিং ও অ্যাড কমাতে নো-কুকি হোস্ট
          height: '100%',
          width: '100%',
          videoId: playlistData[currentIdx].id,
          playerVars: {
            'autoplay': 0,
            'controls': 0,
            'disablekb': 1,
            'fs': 0,
            'rel': 0,
            'modestbranding': 1,
            'iv_load_policy': 3,
            'playsinline': 1,
            'enablejsapi': 1,
            'origin': currentOrigin
          },
          events: {
            'onReady': onPlayerReady,
            'onStateChange': onPlayerStateChange,
            'onError': onPlayerError
          }
        });
      } catch (err) {
        console.error(err);
        fallbackToProxy();
      }
    };

    // এপিআই স্ক্রিপ্ট ইনজেকশন
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    const firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    function onPlayerReady(event) {
      isPlayerReady = true;
      setupCustomControls();
    }

    // অফলাইন/লোকাল প্রোটোকল ফেলব্যাক (লোকালহোস্ট ব্যাকআপ সোর্স)
    function fallbackToProxy() {
      isPlayerReady = false;
      const iframe = document.getElementById('yt-player');
      iframe.src = `https://www.youtube-nocookie.com/embed/${playlistData[currentIdx].id}?enablejsapi=1&controls=0&modestbranding=1&rel=0&iv_load_policy=3&playsinline=1`;
      setupCustomControls();
    }

    function onPlayerStateChange(event) {
      const playIcon = document.getElementById('play-icon');
      const pauseIcon = document.getElementById('pause-icon');
      const activeCard = document.querySelector('.video-card.active');

      if (event.data === YT.PlayerState.PLAYING) {
        playIcon.style.display = 'none';
        pauseIcon.style.display = 'block';
        if (activeCard) activeCard.classList.add('playing'); // ওয়েভ অ্যানিমেশন চালু হবে
        startProgressTracker();
      } else {
        playIcon.style.display = 'block';
        pauseIcon.style.display = 'none';
        if (activeCard) activeCard.classList.remove('playing'); // ওয়েভ অ্যানিমেশন বন্ধ
        stopProgressTracker();
      }

      if (event.data === YT.PlayerState.ENDED) {
        nextVideo();
      }
    }

    function onPlayerError(event) {
      console.warn("Falling back to direct embed...");
      fallbackToProxy();
    }

    // জিরো ল্যাগ মেমোরি সুইপার ভিডিও চ্যাঞ্জার
    function switchVideo(index) {
      if (playlistData.length === 0) return;
      currentIdx = index;
      const video = playlistData[currentIdx];
      
      // UI সাথে সাথে হাইলাইট হবে
      document.querySelectorAll('.video-card').forEach((card, idx) => {
        card.classList.toggle('active', idx === currentIdx);
        card.classList.remove('playing');
      });

      if (isPlayerReady && player && player.loadVideoById) {
        player.loadVideoById(video.id);
      } else {
        const iframe = document.getElementById('yt-player');
        iframe.src = `https://www.youtube-nocookie.com/embed/${video.id}?enablejsapi=1&controls=0&modestbranding=1&rel=0&iv_load_policy=3&playsinline=1`;
      }
    }

    // ডিলিট করার ফাংশন
    function deleteVideo(index) {
      if (confirm("Are you sure you want to remove this song?")) {
        playlistData.splice(index, 1);
        localStorage.setItem('my_custom_playlist', JSON.stringify(playlistData));
        
        if (playlistData.length === 0) {
          // কোনো গান না থাকলে প্লেয়ার খালি করে ডিফল্ট মেসেজ রেন্ডার করা
          document.getElementById('yt-player').innerHTML = "";
          isPlayerReady = false;
        } else {
          // ডিলিট হওয়া গানটি বর্তমানে চলতে থাকলে প্রথম গান থেকে রিস্টার্ট করা
          if (currentIdx === index) {
            currentIdx = 0;
            switchVideo(0);
          } else if (currentIdx > index) {
            currentIdx--;
          }
        }
        renderPlaylist();
      }
    }

    // ৩. স্লিপ টাইমার হ্যান্ডলার
    document.getElementById('sleep-timer').addEventListener('change', (e) => {
      const minutes = parseInt(e.target.value);
      if (sleepTimerTimeout) {
        clearTimeout(sleepTimerTimeout);
        sleepTimerTimeout = null;
      }
      
      if (minutes > 0) {
        sleepTimerTimeout = setTimeout(() => {
          if (isPlayerReady && player && player.pauseVideo) {
            player.pauseVideo();
            alert("Sleep timer finished. Playback paused.");
          } else {
            // প্রক্সি প্লেয়ারের ক্ষেত্রে আইফ্রেম রিলোড দিয়ে ব্লক করা
            const iframe = document.getElementById('yt-player');
            iframe.src = "";
          }
          document.getElementById('sleep-timer').value = "0";
        }, minutes * 60 * 1000);
      }
    });

    // ইউটিউব লিংক থেকে ভিডিও আইডি এক্সট্র্যাক্ট করার রেগুলার এক্সপ্রেশন
    function extractVideoId(url) {
      if (url.length === 11) return url; // সরাসরি আইডি পেস্ট করলে
      const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
      const match = url.match(regExp);
      return (match && match[2].length === 11) ? match[2] : null;
    }

    // ৪. মডাল ওপেন ও গান যোগ করার প্রসেস
    const fabAdd = document.getElementById('fab-add-video');
    const modal = document.getElementById('modal-overlay');
    const btnCloseModal = document.getElementById('btn-close-modal');
    const btnSaveVideo = document.getElementById('btn-save-video');

    fabAdd.onclick = () => {
      modal.style.display = 'flex';
      document.getElementById('video-url').focus();
    };

    btnCloseModal.onclick = () => {
      modal.style.display = 'none';
      clearModalInputs();
    };

    function clearModalInputs() {
      document.getElementById('video-url').value = '';
      document.getElementById('video-title').value = '';
      document.getElementById('video-artist').value = '';
    }

    btnSaveVideo.onclick = () => {
      const url = document.getElementById('video-url').value.trim();
      const title = document.getElementById('video-title').value.trim();
      const artist = document.getElementById('video-artist').value.trim() || "Added Song";

      if (!url) {
        alert("Please paste a YouTube URL or ID!");
        return;
      }
      if (!title) {
        alert("Please enter a title for the song!");
        return;
      }

      const videoId = extractVideoId(url);
      if (!videoId) {
        alert("Invalid YouTube Link or ID. Please check the URL!");
        return;
      }

      // নতুন ভিডিও প্লেলিস্টে পুশ করা হচ্ছে
      const newVideo = {
        id: videoId,
        title: title,
        subtitle: artist
      };

      playlistData.push(newVideo);
      localStorage.setItem('my_custom_playlist', JSON.stringify(playlistData));
      
      modal.style.display = 'none';
      clearModalInputs();
      renderPlaylist();
      
      // যদি এই প্রথম গান যোগ করা হয় তবে স্বয়ংক্রিয়ভাবে সেটি প্লে হবে
      if (playlistData.length === 1) {
        location.reload(); // ফাস্ট রিসেট
      } else {
        switchVideo(playlistData.length - 1);
      }
    };

    // ৫. প্রোগ্রেস বার ট্র্যাকিং
    function startProgressTracker() {
      stopProgressTracker();
      progressTimer = setInterval(() => {
        if (isPlayerReady && player && player.getCurrentTime) {
          const currentTime = player.getCurrentTime();
          const duration = player.getDuration();
          if (duration > 0) {
            const percentage = (currentTime / duration) * 100;
            document.getElementById('progress-fill').style.width = percentage + '%';
            document.getElementById('current-time').innerText = formatTime(currentTime);
            document.getElementById('total-time').innerText = formatTime(duration);
          }
        }
      }, 300);
    }

    function stopProgressTracker() {
      clearInterval(progressTimer);
    }

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }

    function setupCustomControls() {
      const playBtn = document.getElementById('btn-play');
      const prevBtn = document.getElementById('btn-prev');
      const nextBtn = document.getElementById('btn-next');
      const progressBar = document.getElementById('progress-bar');
      const blocker = document.getElementById('player-blocker');

      playBtn.onclick = togglePlay;
      blocker.onclick = togglePlay;

      prevBtn.onclick = prevVideo;
      nextBtn.onclick = nextVideo;

      progressBar.onclick = (e) => {
        if (!isPlayerReady || !player || !player.getDuration) return;
        const rect = progressBar.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const width = rect.width;
        const clickRatio = clickX / width;
        const duration = player.getDuration();
        player.seekTo(duration * clickRatio, true);
      };
    }

    function togglePlay() {
      if (!isPlayerReady || !player || !player.getPlayerState) return;
      const state = player.getPlayerState();
      if (state === YT.PlayerState.PLAYING) {
        player.pauseVideo();
      } else {
        player.playVideo();
      }
    }

    function nextVideo() {
      let nextIdx = currentIdx + 1;
      if (nextIdx >= playlistData.length) nextIdx = 0;
      switchVideo(nextIdx);
    }

    function prevVideo() {
      let prevIdx = currentIdx - 1;
      if (prevIdx < 0) prevIdx = playlistData.length - 1;
      switchVideo(prevIdx);
    }
  </script>
</body>
</html>
